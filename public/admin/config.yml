backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images
locale: ro

collections:
  - name: site_content
    label: Continut Site
    files:
      - file: src/data/siteContent.json
        label: Date principale
        name: site_content
        fields:
          - label: Brand
            name: brand
            widget: object
            fields:
              - { label: Scurt, name: short, widget: string }
              - { label: Nume, name: name, widget: string }
              - { label: Slogan, name: tagline, widget: string }

          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Titlu SEO, name: title, widget: string }
              - { label: Descriere SEO, name: description, widget: text }
              - { label: Imagine Open Graph, name: ogImage, widget: image }

          - label: Contact
            name: contact
            widget: object
            fields:
              - { label: Telefon brut, name: phoneRaw, widget: string }
              - { label: Telefon afișat, name: phoneDisplay, widget: string }
              - { label: Email, name: email, widget: string }
              - { label: Oraș, name: city, widget: string }

          - label: Social Media
            name: socialLinks
            widget: object
            fields:
              - { label: YouTube URL, name: youtube, widget: string }
              - { label: Facebook URL, name: facebook, widget: string }
              - { label: Instagram URL, name: instagram, widget: string }

          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Subtitlu, name: kicker, widget: string }
              - { label: Titlu principal, name: title, widget: string }
              - { label: Descriere, name: description, widget: text }
              - label: Buton principal
                name: ctaPrimary
                widget: object
                fields:
                  - { label: Text, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
              - label: Buton secundar
                name: ctaSecondary
                widget: object
                fields:
                  - { label: Text, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
              - label: Buline beneficii
                name: bullets
                widget: list
                field: { label: Beneficiu, name: bullet, widget: string }

          - label: Servicii
            name: services
            widget: list
            summary: '{{fields.title}}'
            fields:
              - { label: Titlu, name: title, widget: string }
              - { label: Descriere, name: description, widget: text }

          - label: Repertoriu
            name: repertoire
            widget: list
            summary: '{{fields.label}}'
            fields:
              - { label: Titlu secțiune, name: label, widget: string }
              - { label: Text detaliat, name: details, widget: text }

          - label: Noutăți și Comunitate
            name: news
            widget: object
            fields:
              - { label: Introducere secțiune, name: intro, widget: text }
              - label: Postări noutăți
                name: posts
                widget: list
                summary: '{{fields.title}}'
                fields:
                  - { label: Titlu, name: title, widget: string }
                  - { label: Data, name: date, widget: string }
                  - { label: Categorie, name: category, widget: string }
                  - { label: Rezumat, name: summary, widget: text }
              - label: Comentarii aprobate (publice)
                name: approvedComments
                widget: list
                summary: '{{fields.author}} • {{fields.relatedPost}}'
                fields:
                  - { label: Autor, name: author, widget: string }
                  - { label: Noutatea asociată, name: relatedPost, widget: string }
                  - { label: Comentariu, name: text, widget: text }
                  - { label: Reacție emoji, name: reaction, widget: string, required: false }
                  - label: Nivel încredere
                    name: trustLevel
                    widget: select
                    default: nou
                    options:
                      - { label: Nou, value: nou }
                      - { label: Verificat, value: verificat }
                      - { label: Client confirmat, value: confirmat }

          - label: Echipă
            name: team
            widget: object
            fields:
              - label: Soliști vocali
                name: vocalists
                widget: list
                summary: '{{fields.name}}'
                fields:
                  - { label: Nume, name: name, widget: string }
                  - { label: Rol, name: role, widget: string }
                  - { label: Descriere, name: description, widget: text }
                  - { label: Imagine, name: image, widget: image }
              - label: Soliști instrumentiști
                name: instrumentalists
                widget: list
                summary: '{{fields.name}}'
                fields:
                  - { label: Nume, name: name, widget: string }
                  - { label: Rol, name: role, widget: string }
                  - { label: Descriere, name: description, widget: text }
                  - { label: Imagine, name: image, widget: image }
              - label: Colaboratori
                name: collaborators
                widget: list
                summary: '{{fields.instrument}}'
                fields:
                  - { label: Instrument, name: instrument, widget: string }
                  - { label: Nume afișat, name: name, widget: string }
                  - { label: Rol, name: role, widget: string }
                  - { label: Descriere, name: description, widget: text }
                  - { label: Imagine, name: image, widget: image, required: false }

          - label: Galerie Foto (Homepage)
            name: gallery
            widget: list
            summary: '{{fields.alt}}'
            fields:
              - { label: Descriere foto, name: alt, widget: string }
              - { label: Imagine (drag & drop), name: image, widget: image, required: false }

          - label: Momente cu Mirii
            name: realMoments
            widget: object
            fields:
              - label: Statistici
                name: stats
                widget: object
                fields:
                  - { label: Evenimente, name: events, widget: string }
                  - { label: Recenzii, name: reviews, widget: string }
              - { label: Notă consimțământ, name: consentNote, widget: string }
              - label: Evenimente (albume foto)
                name: events
                widget: list
                summary: '{{fields.couple}} — {{fields.city}}'
                fields:
                  - { label: Titlu, name: title, widget: string }
                  - { label: Cuplu (ex. Ana & Ion), name: couple, widget: string }
                  - { label: Oraș, name: city, widget: string }
                  - { label: Dată eveniment, name: date, widget: string }
                  - { label: Imagine principală (drag & drop), name: image, widget: image, required: false }
                  - { label: URL Audio testimonial (MP3), name: audioUrl, widget: string, required: false }
                  - { label: URL YouTube clip, name: youtubeUrl, widget: string, required: false }
                  - { label: Citat cuplu, name: coupleQuote, widget: text, required: false }

          - label: Videoclipuri principale
            name: videos
            widget: list
            summary: '{{fields.title}}'
            fields:
              - { label: Titlu, name: title, widget: string }
              - { label: YouTube ID (ex. aDB9Aa9cFLY), name: youtubeId, widget: string }
              - { label: URL YouTube complet, name: youtubeUrl, widget: string }
              - { label: Categorie, name: category, widget: string }

          - label: Apariții TV
            name: tvAppearances
            widget: list
            summary: '{{fields.show}} — {{fields.year}}'
            fields:
              - { label: Canal TV, name: channel, widget: string }
              - { label: Emisiune / Titlu, name: show, widget: string }
              - { label: An, name: year, widget: string }
              - { label: Notă scurtă, name: note, widget: text }
              - { label: URL YouTube clip, name: videoUrl, widget: string }
              - { label: Logo canal (drag & drop), name: logo, widget: image, required: false }

          - label: Navigație meniu principal
            name: navigation
            widget: list
            summary: '{{fields.label}}'
            fields:
              - { label: Text buton, name: label, widget: string }
              - { label: Link (ex. /galerie-foto), name: href, widget: string }
              - { label: Culoare (cyan / gold / rose / lime / violet / teal), name: color, widget: string }

          - label: Întrebări frecvente (FAQ)
            name: faq
            widget: list
            summary: '{{fields.question}}'
            fields:
              - { label: Întrebare, name: question, widget: string }
              - { label: Răspuns, name: answer, widget: text }

  - name: community_posts
    label: Postări Comunitate
    files:
      - file: src/data/communityPosts.json
        label: Feed Comunitate (postări cu video/foto)
        name: community_posts
        fields:
          - label: Postări
            name: items
            widget: list
            summary: '{{fields.title}}'
            fields:
              - { label: ID unic, name: id, widget: string }
              - { label: Titlu postare, name: title, widget: string }
              - { label: Text caption, name: caption, widget: text }
              - { label: URL YouTube (opțional), name: youtubeUrl, widget: string, required: false }
              - { label: Imagine postare (drag & drop), name: imageUrl, widget: image, required: false }
              - { label: Sursă (ex. Galerie video), name: source, widget: string }
              - { label: Etichetă timp (ex. 1 h), name: publishedLabel, widget: string }

  - name: blog
    label: Blog
    files:
      - file: src/data/blogPosts.json
        label: Articole Blog
        name: blog_posts
        fields:
          - label: Articole
            name: items
            widget: list
            summary: '{{fields.title}}'
            fields:
              - { label: Slug (URL), name: slug, widget: string }
              - { label: Categorie, name: category, widget: string }
              - { label: Culoare categorie, name: categoryAccent, widget: select, options: [rose, gold, teal, cyan, violet, lime] }
              - { label: Titlu articol, name: title, widget: string }
              - { label: Rezumat scurt, name: excerpt, widget: text }
              - { label: Imagine copertă (drag & drop), name: coverImage, widget: image, required: false }
              - { label: Emoji copertă (dacă nu ai imagine), name: coverEmoji, widget: string, required: false }
              - { label: Timp citire (ex. 4 min), name: readTime, widget: string }
              - { label: Dată publicare, name: date, widget: string }
              - { label: Autor, name: author, widget: string }
                  - { label: Rol, name: role, widget: string }
                  - { label: Descriere, name: description, widget: text }
                  - { label: Imagine, name: image, widget: image }
              - label: Colaboratori
                name: collaborators
                widget: list
                summary: '{{fields.instrument}}'
                fields:
                  - { label: Instrument, name: instrument, widget: string }
                  - { label: Descriere, name: description, widget: text }
