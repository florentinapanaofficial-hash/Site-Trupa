<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Logo Formația Florentina Pană</title>
  <desc id="logoDesc">Monogramă FP într-un disc luminos, inspirat de scenă live.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="56" x2="438" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEEFF"/>
      <stop offset="0.55" stop-color="#7EFFA1"/>
      <stop offset="1" stop-color="#D1FF4F"/>
    </linearGradient>
    <linearGradient id="ring" x1="50" y1="50" x2="462" y2="462" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14" result="blur"/>
